<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sistema de Inventario Fiscal TMMGT con OCR</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script> <style>
        :root { --primary-color: #002d72; --accent-color: #ffcc00; }
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .navbar { background-color: var(--primary-color); color: white; font-weight: bold; }
        .step { display: none; padding: 15px; }
        .step.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-area { margin-bottom: 10px; padding: 20px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        /* Estilos de la cámara OCR */
        #reader-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            margin: auto; 
            border: 4px solid var(--primary-color);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        #webcam { width: 100%; display: block; }
        .scan-overlay {
            position: absolute; top: 25%; left: 10%; width: 80%; height: 50%;
            border: 3px dashed #00ff00; pointer-events: none; z-index: 10;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.4);
        }
        /* Caja de Resultado OCR */
        #scan-result-container {
            display: none;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 15px;
            border: 2px solid #28a745;
        }
        #scanned-sebango-text { font-size: 2rem; color: #002d72; font-weight: 900; letter-spacing: 2px; }
</style>
</head>
<body>
 
<nav class="navbar shadow-sm mb-3">
<div class="container-fluid justify-content-center">
<span>INVENTARIO FISCAL 2026 (OCR)</span>
</div>
</nav>
 
<div class="container">
<div id="step1" class="step active">
<h4 class="text-center mb-4">Seleccione Sección A</h4>
<div class="d-grid gap-2">
<button class="btn btn-primary btn-area" onclick="goToStep2('PRENSAS')">PRENSAS</button>
<button class="btn btn-primary btn-area" onclick="goToStep2('SOLDADURA')">SOLDADURA</button>
<button class="btn btn-primary btn-area" onclick="goToStep2('LOGISTICA')">LOGÍSTICA</button>
</div>
</div>
 
    <div id="step2" class="step">
<button class="btn btn-sm btn-outline-secondary mb-3" onclick="resetApp()">← Volver</button>
<h4 id="titleAreaA" class="mb-3"></h4>
<div id="btnContainerB" class="row g-2"></div>
</div>
 
    <div id="step3" class="step text-center">
<button class="btn btn-sm btn-outline-secondary mb-3" onclick="stopScanner(); showStep(2);">← Cambiar Ubicación</button>
<h5>Enfoque el texto del Kanban</h5>
<div id="video-ui">
<div id="reader-wrapper">
<video id="webcam" autoplay playsinline></video>
<div class="scan-overlay"></div>
</div>
<p class="text-muted mt-2 small">Buscando Sebango automáticamente...</p>
</div>
 
        <div id="scan-result-container">
<p class="mb-1 text-muted fw-bold">Texto Detectado:</p>
<h3 id="scanned-sebango-text">---</h3>
<div class="d-grid gap-2 mt-3">
<button class="btn btn-success btn-lg" onclick="confirmScan()">✅ Confirmar e Ir a Captura</button>
<button class="btn btn-warning btn-lg text-dark" onclick="retryScan()">🔄 Volver a Escanear</button>
</div>
</div>
</div>
 
    <div id="step4" class="step">
<div class="card shadow border-0">
<div class="card-header bg-dark text-white text-center">
<h5 class="mb-0" id="resSebango">---</h5>
</div>
<div class="card-body">
<div class="row mb-3 text-center">
<div class="col border-end"><strong>UBIC:</strong> <span id="resUbic"></span></div>
<div class="col"><strong>QPC:</strong> <span id="resQPC">0</span></div>
</div>
 
                <div class="mb-3">
<label class="form-label fw-bold">Cantidad de Cajas:</label>
<input type="number" id="inputCajas" class="form-control form-control-lg" placeholder="0" inputmode="numeric">
</div>
 
                <div id="parcialSection" class="mb-3 p-3 bg-light rounded" style="display:none;">
<label class="form-label fw-bold text-danger">Piezas Sueltas (Parcial):</label>
<input type="number" id="inputPiezas" class="form-control form-control-lg" placeholder="Cantidad de piezas" inputmode="numeric">
<div id="parcialHint" class="form-text mt-2"></div>
</div>
 
                <button class="btn btn-success btn-lg w-100 py-3 mb-2" onclick="validaYCaptura()">GUARDAR CAPTURA</button>
<button class="btn btn-outline-danger w-100" onclick="showStep(3); retryScan();">Cancelar</button>
</div>
</div>
</div>
</div>
 
<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzV8QS_0MoziKQNWYbvJx9B5phRFEBxqzejlNNjAjX8-AreoNrpE-nE12v9hUxR2Rpf/exec%22; 
    const SECCIONES_B = {
        "PRENSAS": ["BL", "TRS", "PGS"],
        "SOLDADURA": ["B01", "B02", "B03", "B04", "B05", "B06", "C01", "C02", "C03", "C04", "D01", "D02", "D03", "D04", "E01", "E02", "E03", "E04", "E05", "E06", "F01", "F02", "F03", "F04", "G01", "G02", "G03", "G04", "G05", "A01"],
        "LOGISTICA": ["BUFFER", "E-COAT", "OSP ´S", "TTMX", "BC SHUTTER", "BC CONTAINERS", "F3A", "F3B", "F3C", "F3D", "F5B", "CONVEYORS", "RECIBO", "CSP"]
    };
 
    const GLS = {
        "SOLDADURA": { 1: "BRAYAN LOPEZ", 2: "IVAN HERNANDEZ", 3: "LUIS RODRIGRUEZ", 4: "GISELA", 5: "OMAR FIDENCIO", 6: "ARTURO TENIENTE" },
        "LOGISTICA": { 7: "DIANA MENDOZA", 8: "SANDRA RODRIGUEZ", 9: "SANDRA SOLANO", 10: "CARLOS PEREZ" },
        "PRENSAS": { 11: "PEDRO TORRES", 12: "MELISSA VALENCIA", 13: "JOSE JUAN PALACIOS", 14: "ANGEL SERRANO" }
    };
 
    let appState = { areaA: "", areaB: "", sebango: "", qpc: 0, isDuplicate: false };
    // Variables OCR
    let ocrWorker = null;
    let scanning = false;
    let localStream = null;
 
    // Inicializar Tesseract en segundo plano al cargar la página
    window.onload = async () => {
        ocrWorker = await Tesseract.createWorker('eng');
        console.log("Motor OCR listo");
    };
 
    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${n}`).classList.add('active');
    }
 
    function resetApp() {
        appState = { areaA: "", areaB: "", sebango: "", qpc: 0 };
        stopScanner();
        showStep(1);
    }
 
    function goToStep2(area) {
        appState.areaA = area;
        document.getElementById('titleAreaA').innerText = "Sección B: " + area;
        const container = document.getElementById('btnContainerB');
        container.innerHTML = "";
        SECCIONES_B[area].forEach(b => {
            container.innerHTML += `<div class="col-6 col-md-4"><button class="btn btn-outline-dark w-100 py-3" onclick="goToStep3('${b}')">${b}</button></div>`;
        });
        showStep(2);
    }
 
    function goToStep3(subArea) {
        appState.areaB = subArea;
        showStep(3);
        startScanner();
    }
 
    // --- LÓGICA DE ESCANEO OCR ---
    async function startScanner() {
        document.getElementById('video-ui').style.display = 'block';
        document.getElementById('scan-result-container').style.display = 'none';
        scanning = true;
 
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('webcam').srcObject = localStream;
                processFrame(); // Iniciar loop de lectura
            } catch (err) {
                Swal.fire('Error de Cámara', 'Permite el acceso a la cámara para escanear', 'error');
            }
        }
    }
 
    function stopScanner() {
        scanning = false;
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
    }
 
    async function processFrame() {
        if (!scanning) return;
 
        const v = document.getElementById('webcam');
        if (v.videoWidth === 0) {
            setTimeout(processFrame, 500);
            return;
        }
 
        // Crear Canvas para extraer la imagen
        const c = document.createElement('canvas');
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        // Filtro mágico para Jamaitas a color (Aumenta contraste y escala de grises)
        ctx.filter = 'grayscale(100%) contrast(250%)';
        ctx.drawImage(v, 0, 0, c.width, c.height);
 
        try {
            if (ocrWorker) {
                const { data: { text } } = await ocrWorker.recognize(c);
                const cleanLines = text.toUpperCase().split(/[\s\n]+/);
 
                let foundSebango = null;
 
                for (let word of cleanLines) {
                    const pure = word.replace(/[^A-Z0-9]/g, '');
                    // Condición 1: Inicia con K, T, A, H, XB o XN. Longitud entre 4 y 6 caracteres.
                    const isValidPrefix = /^(K|T|A|H|XB|XN)[A-Z0-9]{2,5}$/.test(pure);
                    // Condición 2: Omitir números de parte confusos que terminan o incluyen AK
                    const isConfusing = pure.includes('AK');
 
                    if (isValidPrefix && !isConfusing) {
                        foundSebango = pure;
                        break;
                    }
                }
 
                if (foundSebango) {
                    // Detener escaneo temporalmente y mostrar lo leído
                    scanning = false; 
                    document.getElementById('video-ui').style.display = 'none';
                    document.getElementById('scanned-sebango-text').innerText = foundSebango;
                    document.getElementById('scan-result-container').style.display = 'block';
                    appState.sebango = foundSebango;
                    return; // Rompe el loop hasta que el usuario decida
                }
            }
        } catch (e) { console.error("OCR Error", e); }
 
        // Si no encontró nada, repite el ciclo cada medio segundo para no saturar el celular
        setTimeout(processFrame, 500);
    }
 
    function retryScan() {
        document.getElementById('scan-result-container').style.display = 'none';
        document.getElementById('video-ui').style.display = 'block';
        scanning = true;
        processFrame();
    }
 
    // --- CONEXIÓN A BASE DE DATOS TRAS CONFIRMAR OCR ---
    async function confirmScan() {
        stopScanner(); // Apagar cámara para ahorrar batería
        Swal.fire({ title: 'Consultando QPC...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const response = await fetch(`${GOOGLE_URL}?action=checkSebango&sebango=${appState.sebango}&ubicacion=${appState.areaB}`);
            const data = await response.json();
 
            Swal.close();
 
            if (!data.success) {
                Swal.fire('Atención', `El Sebango ${appState.sebango} no se encontró en ${appState.areaB}.`, 'warning');
                return retryScan();
            }
 
            appState.qpc = data.qpc;
            appState.isDuplicate = data.duplicate;
 
            document.getElementById('resSebango').innerText = "SEBANGO: " + appState.sebango;
            document.getElementById('resUbic').innerText = appState.areaB;
            document.getElementById('resQPC').innerText = appState.qpc;
 
            const pSec = document.getElementById('parcialSection');
            const pHint = document.getElementById('parcialHint');
            if (appState.areaA === "LOGISTICA") {
                pSec.style.display = "none";
            } else {
                pSec.style.display = "block";
                pHint.innerText = appState.qpc > 30 ? "QPC > 30: Se anotará como (1) parcial." : "QPC < 30: Cuente las piezas exactas.";
            }
            showStep(4);
        } catch (error) {
            Swal.fire('Error', 'Fallo de conexión con Google Sheets', 'error');
            retryScan();
        }
    }
 
    // --- GUARDAR Y CANDADO ---
    async function validaYCaptura() {
        const cajas = document.getElementById('inputCajas').value;
        const piezas = document.getElementById('inputPiezas').value;
 
        if (!cajas) return Swal.fire('Error', 'Debe ingresar cantidad de cajas', 'error');
 
        if (appState.isDuplicate) {
            const { value: glPass } = await Swal.fire({
                title: 'Registro Duplicado',
                text: 'Ingrese su número de empleado GL para autorizar corrección:',
                input: 'password',
                confirmButtonText: 'Autorizar'
            });
 
            if (!GLS[appState.areaA][glPass]) {
                return Swal.fire('Acceso Denegado', 'Número de GL no válido para esta área', 'error');
            }
        }
 
        const payload = {
            ...appState,
            cajas: parseInt(cajas),
            piezas: parseInt(piezas || 0),
            action: "save"
        };
 
        Swal.fire({ title: 'Guardando...', didOpen: () => Swal.showLoading() });
 
        try {
            await fetch(GOOGLE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
 
            Swal.fire({
                icon: 'success',
                title: 'Captura Exitosa',
                text: `Guardado en ${appState.areaB}`,
                timer: 2000,
                showConfirmButton: false
            });
 
            document.getElementById('inputCajas').value = "";
            document.getElementById('inputPiezas').value = "";
            showStep(3);
            startScanner();
 
        } catch(error) {
            Swal.fire('Error', 'No se pudo guardar la información', 'error');
        }
    }
</script>
 
</body>
</html>
